<!DOCTYPE html>
<html lang="lv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Galerija</title>
<meta name="robots" content="noindex">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="icon" type="image/png" href="favicon.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@600;700&family=Archivo:wght@600;700;800;900&family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#fafaf7;
  --card:#ffffff;
  --ink:#1a1a1a;
  --muted:#6f6f66;
  --accent:#2c7a4b;
  --accent-soft:#e7f2ea;
  --line:#ecece6;
  --shadow:0 2px 14px rgba(20,40,30,.06);
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--ink);font-family:'Work Sans',system-ui,-apple-system,'Segoe UI',sans-serif;line-height:1.5}
h1{font-family:'Archivo','Work Sans',sans-serif}
.wrap{max-width:1100px;margin:0 auto;padding:0 20px}
.icon{width:1em;height:1em;vertical-align:-.12em;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}

/* ===== Galvene ===== */
.ghead{background:#16301f;color:#fff;padding:26px 0 30px}
.back{display:inline-flex;align-items:center;gap:7px;color:rgba(255,255,255,.8);text-decoration:none;font-weight:600;font-size:.9rem;margin-bottom:16px}
.back:hover{color:#fff}
.ghead h1{font-size:clamp(1.8rem,6vw,2.6rem);font-weight:800;letter-spacing:-.01em}
.ghead .sub{color:rgba(255,255,255,.7);font-size:.9rem;margin-top:4px}
.ghead-actions{margin-top:18px}
.btn{display:inline-flex;align-items:center;gap:8px;background:var(--accent);color:#fff;border-radius:999px;padding:11px 18px;font-weight:700;font-size:.88rem;text-decoration:none}
.btn:hover{background:#256b41}

/* ===== Statuss ===== */
.status{padding:48px 20px;text-align:center;color:var(--muted);font-size:.95rem;max-width:560px;margin:0 auto}

/* ===== Režģis ===== */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px;padding:22px 0 50px}
.cell{border:0;margin:0;padding:0;background:#e3e8e1;border-radius:10px;overflow:hidden;cursor:zoom-in;aspect-ratio:1/1;display:block}
.cell img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .25s ease}
.cell:hover img{transform:scale(1.05)}
@media (max-width:640px){.grid{grid-template-columns:repeat(auto-fill,minmax(104px,1fr));gap:6px}}

/* ===== Lightbox ===== */
.lb{position:fixed;inset:0;z-index:1000;background:rgba(10,18,12,.94);display:none;align-items:center;justify-content:center}
.lb.open{display:flex}
.lb img{max-width:92vw;max-height:84vh;border-radius:8px;box-shadow:0 8px 40px rgba(0,0,0,.5)}
.lb-btn{position:absolute;background:rgba(255,255,255,.12);border:0;color:#fff;cursor:pointer;border-radius:999px;display:flex;align-items:center;justify-content:center;transition:background .15s ease}
.lb-btn:hover{background:rgba(255,255,255,.25)}
.lb-close{top:16px;right:18px;width:44px;height:44px;font-size:1.6rem;line-height:1}
.lb-nav{top:50%;transform:translateY(-50%);width:52px;height:52px;font-size:2rem;line-height:1}
.lb-prev{left:14px}
.lb-next{right:14px}
.lb-bar{position:absolute;bottom:18px;left:0;right:0;display:flex;align-items:center;justify-content:center;gap:18px;color:#fff;font-size:.9rem}
.lb-dl{display:inline-flex;align-items:center;gap:7px;color:#fff;text-decoration:none;background:rgba(255,255,255,.14);border-radius:999px;padding:8px 15px;font-weight:600}
.lb-dl:hover{background:rgba(255,255,255,.28)}
@media (max-width:640px){
  .lb-nav{width:42px;height:42px;font-size:1.6rem}
  .lb img{max-width:96vw;max-height:80vh}
}
</style>
</head>
<body>

<svg style="display:none" xmlns="http://www.w3.org/2000/svg">
  <symbol id="i-arrow-left" viewBox="0 0 24 24"><path d="M19 12H5M11 6l-6 6 6 6"/></symbol>
  <symbol id="i-download" viewBox="0 0 24 24"><path d="M12 3v12M7 10l5 5 5-5M5 21h14"/></symbol>
</svg>

<header class="ghead">
  <div class="wrap">
    <a class="back" href="index.html"><svg class="icon"><use href="#i-arrow-left"/></svg> Atpakaļ uz programmu</a>
    <h1 id="g-title">Galerija</h1>
    <div class="sub" id="g-sub"></div>
    <div class="ghead-actions">
      <a class="btn" id="drive-link" target="_blank" rel="noopener" hidden>
        <svg class="icon"><use href="#i-download"/></svg> Lejupielādēt visas (Google Drive)
      </a>
    </div>
  </div>
</header>

<main class="wrap">
  <p class="status" id="status">Ielādē bildes…</p>
  <div class="grid" id="grid"></div>
</main>

<div class="lb" id="lightbox" aria-hidden="true">
  <button class="lb-btn lb-close" id="lb-close" aria-label="Aizvērt">&times;</button>
  <button class="lb-btn lb-nav lb-prev" id="lb-prev" aria-label="Iepriekšējā">&#8249;</button>
  <img id="lb-img" alt="">
  <button class="lb-btn lb-nav lb-next" id="lb-next" aria-label="Nākamā">&#8250;</button>
  <div class="lb-bar">
    <span id="lb-count"></span>
    <a class="lb-dl" id="lb-dl" target="_blank" rel="noopener"><svg class="icon"><use href="#i-download"/></svg> Lejupielādēt</a>
  </div>
</div>

<script src="config.js"></script>
<script>
const C = (typeof CONFIG !== 'undefined') ? CONFIG : {};
const FOLDER = C.galerijasDriveMapesId || '';
const KEY = C.galerijasDriveApiKey || '';
let PHOTOS = [];   // {id, name, thumb, full, dl}
let idx = -1;

function esc(s){
  return String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
}

// Virsraksti un Drive mapes saite
document.title = (C.galerijasVirsraksts || 'Galerija') + (C.nosaukums ? ' · ' + C.nosaukums : '');
document.getElementById('g-title').textContent = C.galerijasVirsraksts || 'Galerija';
const driveLink = document.getElementById('drive-link');
if (FOLDER) {
  driveLink.href = 'https://drive.google.com/drive/folders/' + FOLDER;
  driveLink.hidden = false;
}

const statusEl = document.getElementById('status');
function showStatus(msg){ statusEl.textContent = msg; statusEl.style.display = 'block'; }

// Kārtošanas atslēga (senākās pirmās) pēc augšupielādes laika Drive (createdTime).
function fotoLaiks(f){
  if (f.createdTime) {
    const ms = Date.parse(f.createdTime);
    if (!isNaN(ms)) return ms;
  }
  return Number.MAX_SAFE_INTEGER;
}

// Drive sīkbilžu saite (lh3...) -> vajadzīgais izmērs; rezerve uz drive.google.com/thumbnail
function sized(file, px){
  if (file.thumbnailLink) return file.thumbnailLink.replace(/=[^=]+$/, '') + '=s' + px;
  return 'https://drive.google.com/thumbnail?id=' + file.id + '&sz=w' + px;
}

async function loadAll(){
  if (!FOLDER || !KEY) { showStatus('Galerija vēl nav nokonfigurēta (trūkst Drive mapes ID vai API atslēgas config.js failā).'); return; }
  let files = [], token = '';
  try {
    do {
      const q = "'" + FOLDER + "' in parents and mimeType contains 'image/' and trashed = false";
      const url = 'https://www.googleapis.com/drive/v3/files?key=' + encodeURIComponent(KEY) +
        '&q=' + encodeURIComponent(q) +
        '&fields=nextPageToken,files(id,name,thumbnailLink,createdTime)' +
        '&orderBy=createdTime&pageSize=1000' +
        '&supportsAllDrives=true&includeItemsFromAllDrives=true' +
        (token ? '&pageToken=' + encodeURIComponent(token) : '');
      const res = await fetch(url);
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();
      files = files.concat(data.files || []);
      token = data.nextPageToken || '';
    } while (token);
  } catch (e) {
    showStatus('Neizdevās ielādēt bildes. Pārbaudi, vai Drive mape ir publiska ("Ikviens ar saiti") un vai API atslēga ir pareiza.');
    return;
  }
  files = files.filter(f => f && f.id);
  files.sort((a, b) => {
    const ka = fotoLaiks(a), kb = fotoLaiks(b);
    if (ka !== kb) return ka - kb;  // senākās pirmās
    return (a.name || '').localeCompare(b.name || '', undefined, {numeric: true});
  });
  PHOTOS = files.map(f => ({
    id: f.id,
    name: f.name || '',
    thumb: sized(f, 400),
    full: sized(f, 1600),
    dl: 'https://drive.google.com/uc?export=download&id=' + f.id
  }));
  render();
}

function render(){
  if (!PHOTOS.length) { showStatus('Mapē pagaidām nav bilžu.'); return; }
  statusEl.style.display = 'none';
  document.getElementById('g-sub').textContent = PHOTOS.length + ' bildes';
  const grid = document.getElementById('grid');
  grid.innerHTML = PHOTOS.map((p, i) =>
    '<button class="cell" data-i="' + i + '" aria-label="Atvērt bildi">' +
    '<img loading="lazy" src="' + esc(p.thumb) + '" alt="' + esc(p.name) + '" ' +
    'onerror="this.parentNode.style.display=\'none\'"></button>'
  ).join('');
}

/* ===== Lightbox ===== */
const lb = document.getElementById('lightbox');
const lbImg = document.getElementById('lb-img');
const lbCount = document.getElementById('lb-count');
const lbDl = document.getElementById('lb-dl');

function showCurrent(){
  const p = PHOTOS[idx];
  lbImg.src = p.full;
  lbCount.textContent = (idx + 1) + ' / ' + PHOTOS.length;
  lbDl.href = p.dl;
}
function openLb(i){
  idx = i; showCurrent();
  lb.classList.add('open'); lb.setAttribute('aria-hidden', 'false');
  document.body.style.overflow = 'hidden';
}
function closeLb(){
  lb.classList.remove('open'); lb.setAttribute('aria-hidden', 'true');
  lbImg.src = ''; document.body.style.overflow = '';
}
function navLb(d){ idx = (idx + d + PHOTOS.length) % PHOTOS.length; showCurrent(); }

document.getElementById('grid').addEventListener('click', e => {
  const c = e.target.closest('.cell');
  if (c) openLb(parseInt(c.dataset.i, 10));
});
document.getElementById('lb-close').addEventListener('click', closeLb);
document.getElementById('lb-prev').addEventListener('click', () => navLb(-1));
document.getElementById('lb-next').addEventListener('click', () => navLb(1));
// Klikšķis uz tumšā fona (ne uz bildes/pogām) aizver
lb.addEventListener('click', e => { if (e.target === lb) closeLb(); });
document.addEventListener('keydown', e => {
  if (!lb.classList.contains('open')) return;
  if (e.key === 'Escape') closeLb();
  else if (e.key === 'ArrowLeft') navLb(-1);
  else if (e.key === 'ArrowRight') navLb(1);
});
// Pavilkšana telefonā
let touchX = null;
lb.addEventListener('touchstart', e => { touchX = e.touches[0].clientX; }, {passive: true});
lb.addEventListener('touchend', e => {
  if (touchX === null) return;
  const dx = e.changedTouches[0].clientX - touchX;
  if (Math.abs(dx) > 50) navLb(dx < 0 ? 1 : -1);
  touchX = null;
}, {passive: true});

loadAll();
</script>
</body>
</html>
