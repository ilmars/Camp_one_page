<!DOCTYPE html>
<html lang="lv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Draudzes nometne</title>
<meta name="description" content="Draudzes nometnes programma: dievkalpojumi, svētdienas skola, jauniešu un brīvā laika aktivitātes.">
<!-- SVG ikona pielāgojas sistēmas tēmai (melns uz balta / balts uz melna); PNG ir rezerve -->
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="icon" type="image/png" href="favicon.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<!-- Brandbook fonti: Archivo (virsraksti) + Work Sans (teksts) -->
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@600;700&family=Archivo:wght@600;700;800;900&family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
:root{
  --bg:#fafaf7;
  --card:#ffffff;
  --ink:#1a1a1a;
  --muted:#6f6f66;
  --accent:#2c7a4b;
  --accent-soft:#e7f2ea;
  --line:#ecece6;
  --shadow:0 2px 14px rgba(20,40,30,.06);
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--ink);font-family:'Work Sans',system-ui,-apple-system,'Segoe UI',sans-serif;line-height:1.5}
h1,h2,h3,.kicker,.time,.daypill{font-family:'Archivo','Work Sans',system-ui,sans-serif}
.wrap{max-width:760px;margin:0 auto;padding:0 20px}
.icon{width:1em;height:1em;vertical-align:-.12em;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.icon.wa{fill:currentColor;stroke:none}

/* ===== Hero ===== */
.hero{position:relative;overflow:hidden;background:#16301f}
.hero-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.hero-overlay{position:absolute;inset:0;background:linear-gradient(180deg,rgba(13,28,18,.35),rgba(13,28,18,.78))}
.hero-content{position:relative;padding:88px 0 52px;color:#fff}
.kicker{font-size:.8rem;letter-spacing:.22em;text-transform:uppercase;font-weight:700;color:#9fe0b8;margin-bottom:12px}
.hero-logo{display:block;max-height:110px;max-width:min(70%,420px);margin-bottom:14px}
h1{font-family:'Oswald','Archivo',sans-serif;font-size:clamp(2.8rem,10vw,5.2rem);font-weight:700;line-height:1;letter-spacing:.01em;text-transform:uppercase;max-width:14ch}
.loc{margin-top:14px;font-size:1rem;color:rgba(255,255,255,.85);font-weight:600}
.chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:22px}
.chip{background:rgba(255,255,255,.13);backdrop-filter:blur(4px);border:1px solid rgba(255,255,255,.25);border-radius:999px;padding:8px 15px;font-size:.85rem;font-weight:600}
.hero-note{margin-top:16px;font-size:.82rem;color:rgba(255,255,255,.72)}

/* ===== Day nav ===== */
.daynav{position:sticky;top:0;z-index:10;background:rgba(250,250,247,.93);backdrop-filter:blur(8px);border-bottom:1px solid var(--line)}
.daynav-inner{display:flex;gap:8px;overflow-x:auto;padding:13px 20px;max-width:980px;margin:0 auto;scrollbar-width:none}
@media (min-width:1000px){.daynav-inner{justify-content:center}}
.daynav-inner::-webkit-scrollbar{display:none}
.daypill{flex:0 0 auto;border:1px solid var(--line);background:var(--card);color:var(--muted);border-radius:999px;padding:8px 16px;font:inherit;font-size:.88rem;font-weight:600;cursor:pointer;transition:all .18s ease}
.daypill em{font-style:normal;opacity:.65;font-weight:400;margin-left:5px;font-size:.8em}
.daypill:hover{border-color:var(--accent);color:var(--accent)}
.daypill.active{background:var(--ink);color:#fff;border-color:var(--ink)}
.daypill.active em{opacity:.7}

/* ===== Schedule ===== */
.sched{padding:34px 0 6px}
.day-head{margin-bottom:18px}
.day-head h2{font-size:1.5rem;font-weight:800;letter-spacing:-.01em}
.day-head p{font-size:.88rem;color:var(--muted)}
.event{display:flex;gap:16px;background:var(--card);border-radius:16px;box-shadow:var(--shadow);padding:16px 18px;margin-bottom:12px;animation:rise .35s ease both}
.event:nth-child(2){animation-delay:.03s}.event:nth-child(3){animation-delay:.06s}
.event:nth-child(4){animation-delay:.09s}.event:nth-child(5){animation-delay:.12s}
.event:nth-child(6){animation-delay:.15s}.event:nth-child(7){animation-delay:.18s}
.event:nth-child(8){animation-delay:.21s}.event:nth-child(9){animation-delay:.24s}
.event:nth-child(10){animation-delay:.27s}
/* Notikuma veida krāsu svītra kreisajā malā */
.event.type-dievkalpojums{border-left:3px solid var(--accent)}
.event.type-edienreize{border-left:3px solid #d9a13b}
.event.type-aktivitate{border-left:3px solid #3a8fb7}
.event.type-lugsanas{border-left:3px solid #8a6cb0}
.event.type-seminars{border-left:3px solid #2a9d8f}
.time{font-weight:800;color:var(--accent);min-width:54px;font-size:.95rem;padding-top:1px}
.event-body{flex:1}
.event-body h3{font-size:1rem;font-weight:700}
.event-body .desc{font-size:.84rem;color:var(--muted);margin-top:2px}
.ev-vieta{display:inline-flex;align-items:center;gap:5px;font-size:.8rem;color:var(--muted);margin-top:4px}
.ev-vieta .icon{color:var(--accent)}
.yt-link{display:inline-flex;align-items:center;gap:6px;margin-top:9px;color:var(--accent);font-weight:700;font-size:.82rem;text-decoration:none}
.yt-link:hover{text-decoration:underline}
.tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:9px}
.tag{font-size:.74rem;background:var(--accent-soft);color:var(--accent);border-radius:999px;padding:3px 10px;font-weight:600}
.cats{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:8px;margin-top:10px}
.cat{background:#f7f7f2;border:1px solid var(--line);border-radius:12px;padding:10px 12px}
.cat-tag{display:block;font-size:.68rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--accent);margin-bottom:2px}
.cat b{display:block;font-size:.88rem;font-weight:600;color:var(--ink);line-height:1.25}
.cat-desc{display:block;font-size:.78rem;color:var(--muted);margin-top:2px}
.cat-vieta{display:flex;align-items:center;gap:5px;font-size:.74rem;color:#85857c;font-style:normal;margin-top:2px;text-decoration:none}
.cat-vieta .icon{color:var(--accent)}
.ev-vieta .icon,.cat-vieta .icon{flex:0 0 auto}
a.ev-vieta,a.cat-vieta{color:var(--muted)}
a.cat-vieta{color:#85857c}
.loc-anchor{cursor:pointer}
.loc-anchor:hover{text-decoration:underline;color:var(--accent)}
.loc-anchor:hover .icon{color:var(--accent)}
@keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* ===== Section headings ===== */
.sec{padding:26px 0 10px}
.sec h2{font-size:1.2rem;font-weight:800;margin-bottom:14px}

/* ===== Programmas ===== */
.progs{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:10px}
.prog{background:var(--card);border-radius:14px;box-shadow:var(--shadow);padding:16px 18px;border-top:3px solid var(--accent)}
.prog h3{font-size:1rem;font-weight:700;margin-bottom:6px}
.prog p{font-size:.86rem;color:var(--muted)}

/* ===== Gallery ===== */
.gallery{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.gallery img{width:100%;aspect-ratio:4/3;object-fit:cover;border-radius:14px;background:#e3e8e1;display:block;cursor:zoom-in}
.more-link{display:inline-flex;align-items:center;gap:7px;margin-top:14px;color:var(--accent);font-weight:700;font-size:.9rem;text-decoration:none}
.more-link:hover{text-decoration:underline}

/* ===== Lightbox (bildes lielajā skatā) ===== */
.lb{position:fixed;inset:0;z-index:1000;background:rgba(10,18,12,.92);display:none;align-items:center;justify-content:center;padding:24px;cursor:zoom-out}
.lb.open{display:flex}
.lb img{max-width:100%;max-height:100%;border-radius:10px;box-shadow:0 8px 40px rgba(0,0,0,.5)}

/* ===== Video ===== */
.videos{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:14px}
.vid{background:var(--card);border-radius:14px;box-shadow:var(--shadow);overflow:hidden}
.vid-thumb{position:relative;display:block;width:100%;aspect-ratio:16/9;border:0;padding:0;margin:0;cursor:pointer;background:#000}
.vid-thumb img{width:100%;height:100%;object-fit:cover;display:block}
.vid-play{position:absolute;inset:0;display:flex;align-items:center;justify-content:center}
.vid-play svg{transition:transform .18s ease}
.vid-thumb:hover .vid-play svg{transform:scale(1.08)}
.vid iframe{width:100%;aspect-ratio:16/9;display:block;border:0}
.vid-title{padding:11px 14px;font-size:.9rem;font-weight:600;color:var(--ink)}

/* ===== Contacts ===== */
.contacts{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:10px}
.contact{background:var(--card);border-radius:14px;box-shadow:var(--shadow);padding:14px 16px}
.contact .role{display:block;font-size:.74rem;letter-spacing:.08em;text-transform:uppercase;font-weight:700;color:var(--accent);margin-bottom:3px}
.contact b{display:block;font-size:.95rem}
.contact a{display:inline-flex;align-items:center;gap:6px;margin-top:5px;color:var(--muted);font-size:.85rem;text-decoration:none}
.contact a:hover{color:var(--accent)}
.contact-actions{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.contact-actions a{margin-top:5px}
.contact-actions .c-wa{color:#25D366;font-size:1.15rem}
.contact-actions .c-wa:hover{color:#1da851}
.wa-grupa{display:flex;align-items:center;justify-content:center;gap:10px;margin-top:12px;background:#25D366;color:#fff;border-radius:14px;padding:14px 18px;font-weight:700;font-size:.95rem;text-decoration:none}
.wa-grupa:hover{background:#1da851}
.wa-grupa .icon{width:1.25em;height:1.25em}
/* Izcelts kontakts — pilna platuma josla akcenta krāsā */
.contact--main{grid-column:1/-1;background:var(--accent);color:#fff;display:flex;flex-wrap:wrap;align-items:center;gap:4px 20px}
.contact--main .role{color:rgba(255,255,255,.8);margin-bottom:0}
.contact--main b{font-size:1rem}
.contact--main a{margin-top:0;color:#fff;font-size:1.1rem;font-weight:800}
.contact--main a:hover{color:#fff;text-decoration:underline}
.contact--main .contact-actions .c-wa{color:#fff;font-size:1.25rem}
.contact--main .role-wrap{display:flex;flex-direction:column}

/* ===== Karte ===== */
#karte{position:relative;z-index:0;height:380px;border-radius:14px;overflow:hidden;box-shadow:var(--shadow);background:#e3e8e1}
.loc-links{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px}
.loc-links a{display:inline-flex;align-items:center;gap:6px;background:var(--card);border:1px solid var(--line);border-radius:999px;padding:7px 14px;font-size:.85rem;font-weight:600;color:var(--ink);text-decoration:none}
.loc-links a:hover{border-color:var(--accent);color:var(--accent)}
.loc-links a .icon{color:var(--accent)}
.leaflet-container a{color:var(--accent)}

/* ===== Footer ===== */
footer{padding:34px 0 44px;text-align:center;color:var(--muted);font-size:.82rem}
footer b{color:var(--ink)}

@media (max-width:480px){
  .hero-content{padding:64px 0 40px}
  .wrap{padding:0 12px}
  .event{padding:14px 14px;gap:12px}
  .time{min-width:46px}
  .cats{grid-template-columns:1fr 1fr;gap:6px}
  .cat{padding:8px 10px}
  .gallery{grid-template-columns:1fr 1fr}
}
</style>
</head>

<!-- Visa aizpildāmā informācija un teksti ir failā config.js -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="config.js"></script>
<script>
const C = (typeof CONFIG !== 'undefined') ? CONFIG : {};

// Lokācijas un kontakti — sākotnēji no config (rezerve), pēc tam ielādē no CSV, ja norādīts
let LOKACIJAS = C.lokacijas || [];
let KONTAKTI = C.kontakti || [];
// Galerija: rezervē config saraksts (thumb==full), pēc tam ielādē no Drive
let GALERIJA = (C.galerija || []).map(u => ({thumb: u, full: u}));

// YouTube video ID no jebkuras saites formas (vai pati ID, ja jau iedota)
function ytId(url){
  if (!url) return '';
  url = String(url).trim();
  const m = url.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?(?:.*&)?v=|embed\/|shorts\/|live\/|v\/))([\w-]{11})/);
  if (m) return m[1];
  return /^[\w-]{11}$/.test(url) ? url : '';
}
// Video: rezervē config saraksts, pēc tam ielādē no CSV (ja norādīts)
let VIDEO = (C.video || [])
  .map(v => ({virsraksts: v.virsraksts || v.nosaukums || '', id: ytId(v.youtube || v.saite || v.id || '')}))
  .filter(v => v.id);

const PARALLEL = C.grupas || [];
const DAY_META = {};
for (const [name, info] of Object.entries(C.dienas || {})) {
  DAY_META[name] = {date: info.datums || '', sub: info.piezime, d: parseInt(info.datums, 10) || 0,
                    m: parseInt((info.datums || '').split('.')[1], 10) || 0};
}

function esc(s){
  return String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
}

// "Trešdiena" -> "tresdiena" (adreses enkuram #tresdiena)
function slug(s){
  const map = {'ā':'a','č':'c','ē':'e','ģ':'g','ī':'i','ķ':'k','ļ':'l','ņ':'n','š':'s','ū':'u','ž':'z'};
  return String(s).toLowerCase().replace(/[āčēģīķļņšūž]/g, c => map[c]).replace(/\s+/g, '-');
}

// Lokācijas teksta normalizēšana (mazie burti, bez garumzīmēm/pieturzīmēm)
function normLoc(s){
  const map = {'ā':'a','č':'c','ē':'e','ģ':'g','ī':'i','ķ':'k','ļ':'l','ņ':'n','š':'s','ū':'u','ž':'z'};
  return String(s || '').toLowerCase().replace(/[āčēģīķļņšūž]/g, c => map[c])
    .replace(/[^a-z0-9]+/g, ' ').trim();
}

// Atrod kartes lokāciju, kas atbilst notikuma vietas tekstam (panes locījumus, piem. "Lielajā teltī" -> "Lielā telts")
function matchLokacija(text){
  const list = LOKACIJAS;
  const na = normLoc(text);
  if (!na || !list.length) return null;
  const wa = na.split(' ').filter(Boolean);
  let best = null, bestScore = 0;
  for (const l of list) {
    const nb = normLoc(l.nosaukums);
    if (!nb) continue;
    if (na === nb) return l;
    const wb = nb.split(' ').filter(Boolean);
    let matched = 0;
    for (const w of wb) {
      if (wa.some(x => (x.length >= 4 && w.length >= 4) ? x.slice(0, 4) === w.slice(0, 4) : x === w)) matched++;
    }
    const score = matched / wb.length;
    if (score > bestScore) { bestScore = score; best = l; }
  }
  return bestScore >= 0.6 ? best : null;
}

// Vietas elements — saite, ko nospiežot aizritina uz iegulto karti un izceļ
// attiecīgo marķieri; ja vieta neatbilst kartes lokācijai — parasts teksts.
function vietaEl(text, baseClass){
  const inner = '<svg class="icon"><use href="#i-pin"/></svg>' + esc(text);
  const m = matchLokacija(text);
  return m
    ? '<a class="' + baseClass + ' loc-anchor" href="#karte-sec" data-loc="' + esc(m.nosaukums) + '">' + inner + '</a>'
    : '<span class="' + baseClass + '">' + inner + '</span>';
}

/* ===== Statiskās sadaļas no konfigurācijas ===== */
function renderStatic(){
  document.title = (C.nosaukums || 'Nometne') + (C.datumi ? ' · ' + C.datumi : '');
  const heroImg = document.getElementById('hero-img');
  if (C.heroBilde) {
    heroImg.onerror = () => { heroImg.style.display = 'none'; };
    heroImg.src = C.heroBilde;
  } else {
    heroImg.style.display = 'none';
  }
  document.getElementById('kicker').textContent = C.datumi || '';
  const logo = document.getElementById('logo');
  if (C.logo) {
    logo.onerror = () => { logo.hidden = true; };
    logo.alt = C.nosaukums || '';
    logo.src = C.logo;
    logo.hidden = false;
  }
  // Hero virsraksts: "heroVirsraksts" lauks, ja tāds ir (var būt tukšs = bez teksta); citādi "nosaukums".
  const heroText = ('heroVirsraksts' in C) ? C.heroVirsraksts : C.nosaukums;
  const h1 = document.getElementById('nosaukums');
  h1.textContent = heroText || '';
  if (!heroText) h1.hidden = true;
  document.getElementById('vieta').innerHTML = '<svg class="icon"><use href="#i-pin"/></svg> ' + esc(C.vieta || '');
  document.getElementById('grupas').innerHTML = PARALLEL.map(g => '<span class="chip">' + esc(g) + '</span>').join('');
  document.getElementById('piezime').textContent = C.piezime || '';

  const progSec = document.getElementById('programmas-sec');
  if (C.programmas && C.programmas.length) {
    progSec.hidden = false;
    document.getElementById('programmu-virsraksts').textContent = C.programmuVirsraksts || '';
    document.getElementById('programmas').innerHTML = C.programmas.map(p =>

/* ===== Plāna ielāde no Google izklājlapas CSV ===== */
function parseCSV(text){
  text = text.replace(/^\uFEFF/, ''); // noņem BOM, lai galvenes atpazīšana nesalūst
  const rows = []; let row = [], cell = '', q = false;
  for (let i = 0; i < text.length; i++) {
    const ch = text[i];
    if (q) {
      if (ch === '"') { if (text[i+1] === '"') { cell += '"'; i++; } else q = false; }
      else cell += ch;
    }
    else if (ch === '"') q = true;
    else if (ch === ',') { row.push(cell); cell = ''; }
    else if (ch === '\n') { row.push(cell.replace(/\r$/,'')); rows.push(row); row = []; cell = ''; }
    else cell += ch;
  }
  if (cell !== '' || row.length) { row.push(cell.replace(/\r$/,'')); rows.push(row); }
  return rows;
}

// "Ēdienreizes" / "ēdienreize" / "Edienreize" -> 'edienreize' utt.
function eventType(s){
  s = (s || '').trim().toLowerCase();
  if (s.indexOf('dievkalp') === 0) return 'dievkalpojums';
  if (s.indexOf('ēdien') === 0 || s.indexOf('edien') === 0) return 'edienreize';
  if (s.indexOf('aktivit') >= 0) return 'aktivitate'; // arī "Dienas aktivitātes", "Nakts aktivitāte"
  if (s.indexOf('lūgšan') === 0 || s.indexOf('lugsan') === 0) return 'lugsanas';
  if (s.indexOf('semin') === 0) return 'seminars';
  return '';
}

// Grupas kartītes virsraksts no Veids kolonnas teksta:
// konkrēts teksts ("Vakara aktivitātes") -> kā rakstīts; vienkāršs "Aktivitāte(s)"
// vai tukšs -> pēc laika: vēlu (>=21:00) "Nakts aktivitātes", citādi "Dienas aktivitātes".
function aktTitle(veidsRaw, laiks){
  const raw = (veidsRaw || '').trim();
  if (!raw || /^aktivit(ā|a)te(s)?$/i.test(raw)) {
    const h = parseInt(laiks, 10);
    return (h >= 21 || h < 5) ? 'Nakts aktivitātes' : 'Dienas aktivitātes';
  }
  return raw.charAt(0).toUpperCase() + raw.slice(1);
}

function buildDays(rows){
  if (!rows.length) return [];
  // Kolonnas atpazīst pēc galvenes nosaukumiem; ja galvene nav atpazīstama,
  // pieņem klasisko secību Diena,Laiks,Nosaukums,Apraksts,Grupa,YouTube,Veids.
  const header = rows[0].map(h => (h || '').trim().toLowerCase());
  let idx = {
    diena: header.indexOf('diena'), laiks: header.indexOf('laiks'),
    nosaukums: header.indexOf('nosaukums'), apraksts: header.indexOf('apraksts'),
    grupa: header.indexOf('grupa'), youtube: header.indexOf('youtube'),
    veids: header.indexOf('veids'),
    aktivs: Math.max(header.indexOf('aktīvs'), header.indexOf('aktivs')),
    vieta: header.indexOf('vieta')
  };
  if (idx.diena < 0 || idx.laiks < 0 || idx.nosaukums < 0) {
    idx = {diena:0, laiks:1, nosaukums:2, apraksts:3, grupa:4, youtube:5, veids:6};
  }
  const cell = (r, i) => (i >= 0 && r[i] ? r[i] : '').trim();

  const days = [], byName = {};
  for (const r of rows.slice(1)) {
    const diena = cell(r, idx.diena), laiks = cell(r, idx.laiks), nosaukums = cell(r, idx.nosaukums);
    const apraksts = cell(r, idx.apraksts), grupa = cell(r, idx.grupa), youtube = cell(r, idx.youtube);
    const vieta = cell(r, idx.vieta);
    const tips = eventType(cell(r, idx.veids));
    if (!diena || !laiks || !nosaukums) continue;
    // Ja izklājlapā ir kolonna "Aktīvs", rāda tikai rindas ar TRUE
    if (idx.aktivs >= 0 && !/^(true|patiess|jā|ja|1|x)$/i.test(cell(r, idx.aktivs))) continue;
    if (!byName[diena]) {
      byName[diena] = {name: diena, ...(DAY_META[diena] || {}), events: []};
      days.push(byName[diena]);
    }
    const day = byName[diena];
    const irGrupasKategorija = grupa && !/paral/i.test(grupa) && tips === '';
    if (tips === 'aktivitate' || irGrupasKategorija) {
      // Aktivitātes ar vienādu dienu, laiku un veidu sagrupējas vienā kartītē.
      // Kartītes virsraksts = Veids kolonnas teksts ("Dienas aktivitātes",
      // "Nakts aktivitātes" ...). Kastītes nosaukums = Grupa (ja ir) vai
      // notikuma nosaukums.
      const veidsRaw = idx.veids >= 0 ? cell(r, idx.veids) : '';
      const key = laiks + '|' + veidsRaw.toLowerCase();
      let ev = day.events.find(e => e.cats && e.gkey === key);
      if (!ev) {
        ev = {time: laiks, title: aktTitle(veidsRaw, laiks), cats: [], type: 'aktivitate', gkey: key};
        day.events.push(ev);
      }
      if (grupa && !/paral/i.test(grupa)) {
        ev.cats.push({tag: grupa, title: nosaukums, desc: apraksts || undefined,
                      vieta: vieta || undefined, hasGrupa: true});
      } else {
        ev.cats.push({title: nosaukums, desc: apraksts || undefined, vieta: vieta || undefined, hasGrupa: false});
      }
    } else {
      const ev = {time: laiks, title: nosaukums, desc: apraksts || undefined,
                  vieta: vieta || undefined, type: tips || undefined,
                  yt: /^https?:\/\//i.test(youtube) ? youtube : undefined};
      if (/paral/i.test(grupa)) {
        ev.parallel = true; // standarta trīs grupu birkas no config
      } else if (grupa) {
        // Savas birkas, atdalītas ar semikolu, piem.:
        // "Pieaugušie un jaunieši; Svētdienas skola (3–11 g.)"
        ev.tags = grupa.split(';').map(s => s.trim()).filter(Boolean);
      }
      day.events.push(ev);
    }
  }
  // Ja "grupā" sanākusi tikai viena aktivitāte bez grupas — rāda kā parastu kartīti
  for (const day of days) {
    day.events = day.events.map(ev => {
      if (ev.cats && ev.cats.length === 1 && !ev.cats[0].hasGrupa) {
        const c = ev.cats[0];
        return {time: ev.time, title: c.title, desc: c.desc || undefined,
                vieta: c.vieta, type: 'aktivitate'};
      }
      return ev;
    });
  }
  return days;
}

function autoSelect(){
  // Prioritāte: adreses enkurs (#otrdiena) → šodiena nometnes laikā → pirmā diena.
  let start = dayIndexFromHash();
  if (start < 0) {
    const now = new Date();
    start = DAYS.findIndex(d => d.d === now.getDate() && d.m === now.getMonth() + 1);

async function loadCsv(url){
  try {
    // Taimauts, lai vājā tīklā lapa nepaliek gaidām bezgalīgi
    const signal = (typeof AbortSignal !== 'undefined' && AbortSignal.timeout) ? AbortSignal.timeout(8000) : undefined;
    const res = await fetch(url, {signal: signal});
    if (res.ok) {
      const built = buildDays(parseCSV(await res.text()));
      if (built.length) { DAYS = built; return true; }
    }
  } catch (e) { /* nav pieejams vai taimauts — mēģinās nākamo avotu */ }
  return false;
}

// Lokāciju ielāde no Google Sheets CSV (kolonnas: Nosaukums, Lat, Lng, Active)
function lokacijasFromRows(rows){
  if (!rows.length) return [];
  const h = rows[0].map(x => (x || '').trim().toLowerCase());
  const iN = h.indexOf('nosaukums');
  const iLat = Math.max(h.indexOf('lat'), h.indexOf('latitude'));
  const iLng = Math.max(h.indexOf('lng'), h.indexOf('lon'), h.indexOf('longitude'));
  const iAct = Math.max(h.indexOf('active'), h.indexOf('aktīvs'), h.indexOf('aktivs'));
  if (iN < 0 || iLat < 0 || iLng < 0) return [];
  const out = [];
  for (const r of rows.slice(1)) {
    const cell = i => (i >= 0 && r[i] ? r[i] : '').trim();
    const nos = cell(iN), lat = parseFloat(cell(iLat)), lng = parseFloat(cell(iLng));
    if (!nos || isNaN(lat) || isNaN(lng)) continue;
    if (iAct >= 0 && cell(iAct) && !/^(true|patiess|jā|ja|1|x)$/i.test(cell(iAct))) continue;
    out.push({nosaukums: nos, koord: [lat, lng]});
  }
  return out;
}

  if (C.lokacijuCsvUrl) {

      const res = await fetch(C.lokacijuCsvUrl, {signal: signal});

// Kontaktu ielāde no Google Sheets CSV (kolonnas: Nosaukums, Vārds, numurs, Izcelt)
function kontaktiFromRows(rows){
  if (!rows.length) return [];
  const h = rows[0].map(x => (x || '').trim().toLowerCase());
  const iLoma = Math.max(h.indexOf('nosaukums'), h.indexOf('loma'));
  const iVards = Math.max(h.indexOf('vārds'), h.indexOf('vards'));
  const iTel = Math.max(h.indexOf('numurs'), h.indexOf('telefons'), h.indexOf('tālrunis'), h.indexOf('talrunis'));
  const iIzc = Math.max(h.indexOf('izcelt'), h.indexOf('izcelts'));
  if (iLoma < 0 && iTel < 0) return [];
  const out = [];
  for (const r of rows.slice(1)) {
    const cell = i => (i >= 0 && r[i] ? r[i] : '').trim();
    const loma = cell(iLoma), vards = cell(iVards), tel = cell(iTel);
    if (!loma && !vards && !tel) continue;
    const izcelts = iIzc >= 0 && /^(true|patiess|jā|ja|1|x)$/i.test(cell(iIzc));
    out.push({loma: loma, vards: vards, telefons: tel, izcelts: izcelts});
  }
  return out;
}

// Kārtošanas atslēga (senākās pirmās) pēc augšupielādes laika Drive (createdTime).
function fotoLaiks(f){
  if (f.createdTime) {
    const ms = Date.parse(f.createdTime);
    if (!isNaN(ms)) return ms;
  }
  return Number.MAX_SAFE_INTEGER;
}

// Galerijas bilžu ielāde no publiskas Google Drive mapes (vajag mapes ID + API atslēgu)
async function loadGalerija(){
  const id = C.galerijasDriveMapesId, key = C.galerijasDriveApiKey;
  if (!id || !key) return;
  try {
    const q = "'" + id + "' in parents and mimeType contains 'image/' and trashed = false";
    const url = 'https://www.googleapis.com/drive/v3/files?key=' + encodeURIComponent(key) +
      '&q=' + encodeURIComponent(q) +
      '&fields=files(id,name,createdTime)&orderBy=createdTime&pageSize=1000' +
      '&supportsAllDrives=true&includeItemsFromAllDrives=true';
    const signal = (typeof AbortSignal !== 'undefined' && AbortSignal.timeout) ? AbortSignal.timeout(8000) : undefined;
    const res = await fetch(url, {signal: signal});
    if (res.ok) {
      const data = await res.json();
      const files = (data.files || []).filter(f => f && f.id);
      files.sort((a, b) => {
        const ka = fotoLaiks(a), kb = fotoLaiks(b);
        if (ka !== kb) return ka - kb;  // senākās pirmās
        return (a.name || '').localeCompare(b.name || '', undefined, {numeric: true});
      });
      if (files.length) {
        GALERIJA = files.map(f => ({
          thumb: 'https://drive.google.com/thumbnail?id=' + f.id + '&sz=w800',
          full:  'https://drive.google.com/thumbnail?id=' + f.id + '&sz=w1600'
        }));
      }
    }
  } catch (e) { /* nav pieejams — paliek config rezerve */ }
}

// Video saraksta ielāde no Google Sheets CSV (kolonnas: Nosaukums, YouTube, Aktīvs)
function videoFromRows(rows){
  if (!rows.length) return [];
  const h = rows[0].map(x => (x || '').trim().toLowerCase());
  const iT = Math.max(h.indexOf('nosaukums'), h.indexOf('virsraksts'), h.indexOf('tituls'));
  const iU = Math.max(h.indexOf('youtube'), h.indexOf('saite'), h.indexOf('links'), h.indexOf('url'), h.indexOf('video'));
  const iA = Math.max(h.indexOf('aktīvs'), h.indexOf('aktivs'), h.indexOf('active'));
  if (iU < 0) return [];
  const out = [];
  for (const r of rows.slice(1)) {
    const cell = i => (i >= 0 && r[i] ? r[i] : '').trim();
    const id = ytId(cell(iU));
    if (!id) continue;
    if (iA >= 0 && cell(iA) && !/^(true|patiess|jā|ja|1|x)$/i.test(cell(iA))) continue;
    out.push({virsraksts: cell(iT), id: id});
  }
  return out;
}

async function loadVideo(){
  if (C.videoCsvUrl) {
    try {
      const signal = (typeof AbortSignal !== 'undefined' && AbortSignal.timeout) ? AbortSignal.timeout(8000) : undefined;
      const res = await fetch(C.videoCsvUrl, {signal: signal});
      if (res.ok) {
        const built = videoFromRows(parseCSV(await res.text()));
        if (built.length) { VIDEO = built; }
      }
    } catch (e) { /* nav pieejams — paliek config rezerve */ }
  }
}

// Kartes sadaļa: lokāciju pogas + sadaļas redzamība (karti zīmē initMap)
function renderLokacijas(){
  document.getElementById('karte-sec').hidden = !LOKACIJAS.length;
  document.getElementById('karte-virsraksts').textContent = C.karteVirsraksts || '';
  document.getElementById('loc-links').innerHTML = LOKACIJAS.map(l =>
    '<a class="loc-anchor" href="#karte-sec" data-loc="' + esc(l.nosaukums || '') + '">' +
    '<svg class="icon"><use href="#i-pin"/></svg>' + esc(l.nosaukums || '') + '</a>'
  ).join('');
}

let MAP = null;
const MARKERS = {}; // normLoc(nosaukums) -> marker, lai saites var atvērt pareizo

function initMap(){
  if (typeof L === 'undefined') return; // Leaflet nav ielādēts (piem., nav interneta)
  const lokacijas = LOKACIJAS.filter(l => Array.isArray(l.koord) && l.koord.length === 2);
  if (!lokacijas.length) return;
  MAP = L.map('karte', {scrollWheelZoom: false});
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19, attribution: '&copy; OpenStreetMap'
  }).addTo(MAP);
  const markers = lokacijas.map(l => {
    const href = l.links || ('https://www.google.com/maps?q=' + l.koord[0] + ',' + l.koord[1]);
    const m = L.marker(l.koord).addTo(MAP).bindPopup(
      '<b>' + esc(l.nosaukums || '') + '</b>' + (l.apraksts ? '<br>' + esc(l.apraksts) : '') +
      '<br><a href="' + esc(href) + '" target="_blank" rel="noopener">Atvērt kartē</a>',
      {autoPan: false}); // necentrē pats — to dara openLokacija()
    MARKERS[normLoc(l.nosaukums)] = m;
    return m;
  });
  if (markers.length > 1) {
    map_fit(markers);
  } else {
    MAP.setView(lokacijas[0].koord, C.karteTuvinajums || 15);
  }
}

function map_fit(markers){
  MAP.fitBounds(L.featureGroup(markers).getBounds().pad(0.3));
}

// Klikšķis uz vietas saites grafikā: aizritina uz karti un izceļ marķieri
function openLokacija(nosaukums){
  const sec = document.getElementById('karte-sec');
  if (sec) sec.scrollIntoView({behavior: 'smooth', block: 'start'});
  const m = MARKERS[normLoc(nosaukums)];
  if (m && MAP) {
    setTimeout(() => {
      MAP.invalidateSize();
      const zoom = Math.max(MAP.getZoom(), 18);
      // Iecentrē marķieri, tad pabīda nedaudz uz leju, lai lodziņš virs tā ir redzams
      const pt = MAP.project(m.getLatLng(), zoom).subtract([0, 70]);
      MAP.setView(MAP.unproject(pt, zoom), zoom, {animate: true});
      m.openPopup();
    }, 500);
  }
}
document.addEventListener('click', e => {
  const a = e.target.closest('.loc-anchor');
  if (!a) return;
  e.preventDefault();
  openLokacija(a.dataset.loc);
});

// Galerijas lightbox: klikšķis uz bildes to atver lielajā skatā
const LB = document.getElementById('lightbox');
if (LB) {
  const lbImg = LB.querySelector('img');
  const closeLB = () => { LB.classList.remove('open'); LB.setAttribute('aria-hidden', 'true'); lbImg.src = ''; };
  document.getElementById('galerija').addEventListener('click', e => {
    const img = e.target.closest('img');
    if (!img || !img.dataset.full) return;
    lbImg.src = img.dataset.full;
    LB.classList.add('open');
    LB.setAttribute('aria-hidden', 'false');
  });
  LB.addEventListener('click', closeLB);
  document.addEventListener('keydown', e => { if (e.key === 'Escape' && LB.classList.contains('open')) closeLB(); });
}


async function init(){
  renderStatic();
  // Lokācijas un kontakti: ielādē no CSV (ja norādīts), tad attēlo
  await Promise.all([loadLokacijas(), loadKontakti(), loadGalerija(), loadVideo()]);
  renderLokacijas();
  renderKontakti();
  renderGalerija();
  renderVideo();
  initMap();
  // Uzreiz rāda iebūvēto plānu, lai lapa nekad nestāv tukša...
  renderNav();
  autoSelect();
  // ...un tad klusi atsvaidzina ar īstajiem datiem.
  // Avoti pēc prioritātes: Google izklājlapa → lokālais dienas-plans.csv → iebūvētais plāns.
  // Lokālais CSV strādā tikai tad, ja lapa atvērta caur serveri (http), ne kā file://.
  let avots = 'iebūvētais (ne izklājlapa, ne dienas-plans.csv nebija pieejami)';
  if (C.sheetCsvUrl && await loadCsv(C.sheetCsvUrl)) {
    avots = 'Google izklājlapa';
  } else if (await loadCsv('dienas-plans.csv')) {
    avots = 'lokālais fails dienas-plans.csv (Google izklājlapa nebija pieejama)';
  }
  console.info('Dienas plāns: ' + avots);
  if (DAYS !== DEFAULT_DAYS) {
    renderNav();
    autoSelect(); // enkurs adresē saglabā izvēlēto dienu
  }
}

init();
</script>
