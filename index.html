<!DOCTYPE html>
<html lang="lv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Draudzes ģimeņu nometne · 21.–26. jūnijs</title>
<meta name="description" content="Draudzes ģimeņu nometnes programma: dievkalpojumi, svētdienas skola, jauniešu un brīvā laika aktivitātes.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#fafaf7;
  --card:#ffffff;
  --ink:#1a1a1a;
  --muted:#8a8a82;
  --accent:#2c7a4b;
  --accent-soft:#e7f2ea;
  --line:#ecece6;
  --shadow:0 2px 14px rgba(20,40,30,.06);
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--ink);font-family:'Inter',system-ui,-apple-system,'Segoe UI',sans-serif;line-height:1.5}
.wrap{max-width:760px;margin:0 auto;padding:0 20px}

/* ===== Hero ===== */
.hero{position:relative;overflow:hidden;background:#16301f}
.hero-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.hero-overlay{position:absolute;inset:0;background:linear-gradient(180deg,rgba(13,28,18,.35),rgba(13,28,18,.78))}
.hero-content{position:relative;padding:88px 0 52px;color:#fff}
.kicker{font-size:.8rem;letter-spacing:.22em;text-transform:uppercase;font-weight:700;color:#9fe0b8;margin-bottom:12px}
h1{font-size:clamp(2.3rem,7vw,3.8rem);font-weight:900;line-height:1.05;letter-spacing:-.02em}
.loc{margin-top:14px;font-size:1rem;color:rgba(255,255,255,.85);font-weight:600}
.chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:22px}
.chip{background:rgba(255,255,255,.13);backdrop-filter:blur(4px);border:1px solid rgba(255,255,255,.25);border-radius:999px;padding:8px 15px;font-size:.85rem;font-weight:600}
.hero-note{margin-top:16px;font-size:.82rem;color:rgba(255,255,255,.72)}

/* ===== Day nav ===== */
.daynav{position:sticky;top:0;z-index:10;background:rgba(250,250,247,.93);backdrop-filter:blur(8px);border-bottom:1px solid var(--line)}
.daynav-inner{display:flex;gap:8px;overflow-x:auto;padding:13px 20px;max-width:760px;margin:0 auto;scrollbar-width:none}
.daynav-inner::-webkit-scrollbar{display:none}
.daypill{flex:0 0 auto;border:1px solid var(--line);background:var(--card);color:var(--muted);border-radius:999px;padding:8px 16px;font:inherit;font-size:.88rem;font-weight:600;cursor:pointer;transition:all .18s ease}
.daypill em{font-style:normal;opacity:.65;font-weight:400;margin-left:5px;font-size:.8em}
.daypill:hover{border-color:var(--accent);color:var(--accent)}
.daypill.active{background:var(--ink);color:#fff;border-color:var(--ink)}
.daypill.active em{opacity:.7}

/* ===== Schedule ===== */
.sched{padding:34px 0 6px}
.day-head{margin-bottom:18px}
.day-head h2{font-size:1.5rem;font-weight:800;letter-spacing:-.01em}
.day-head p{font-size:.88rem;color:var(--muted)}
.event{display:flex;gap:16px;background:var(--card);border-radius:16px;box-shadow:var(--shadow);padding:16px 18px;margin-bottom:12px;animation:rise .35s ease both}
.event:nth-child(2){animation-delay:.03s}.event:nth-child(3){animation-delay:.06s}
.event:nth-child(4){animation-delay:.09s}.event:nth-child(5){animation-delay:.12s}
.event:nth-child(6){animation-delay:.15s}.event:nth-child(7){animation-delay:.18s}
.event:nth-child(8){animation-delay:.21s}.event:nth-child(9){animation-delay:.24s}
.time{font-weight:800;color:var(--accent);min-width:54px;font-size:.95rem;padding-top:1px}
.event-body{flex:1}
.event-body h3{font-size:1rem;font-weight:700}
.event-body .desc{font-size:.84rem;color:var(--muted);margin-top:2px}
.tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:9px}
.tag{font-size:.74rem;background:var(--accent-soft);color:var(--accent);border-radius:999px;padding:3px 10px;font-weight:600}
.cats{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:8px;margin-top:10px}
.cat{background:#f7f7f2;border:1px solid var(--line);border-radius:12px;padding:10px 12px}
.cat b{display:block;font-size:.84rem}
.cat span{font-size:.78rem;color:var(--muted)}
@keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* ===== Gallery ===== */
.gallery-sec{padding:26px 0 10px}
.gallery-sec h2{font-size:1.2rem;font-weight:800;margin-bottom:14px}
.gallery{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.gallery img{width:100%;aspect-ratio:4/3;object-fit:cover;border-radius:14px;background:#e3e8e1;display:block}

/* ===== Footer ===== */
footer{padding:34px 0 44px;text-align:center;color:var(--muted);font-size:.82rem}
footer b{color:var(--ink)}

@media (max-width:480px){
  .hero-content{padding:64px 0 40px}
  .gallery{grid-template-columns:1fr 1fr}
  .gallery img:last-child{display:none}
}
</style>
</head>
<body>

<header class="hero">
  <img class="hero-img" src="https://images.unsplash.com/photo-1504280390367-361c6d9f38f4?auto=format&fit=crop&w=1600&q=80" alt="" onerror="this.style.display='none'">
  <div class="hero-overlay"></div>
  <div class="wrap hero-content">
    <div class="kicker">21.–26. jūnijs</div>
    <h1>Draudzes<br>ģimeņu nometne</h1>
    <div class="loc">📍 Nometnes vieta</div>
    <div class="chips">
      <span class="chip">👨‍👩‍👧 Pieaugušie</span>
      <span class="chip">🙌 Jaunieši (no 12 g.)</span>
      <span class="chip">🎨 Svētdienas skola (3–11 g.)</span>
    </div>
    <p class="hero-note">Dievkalpojumi visām trim grupām notiek paralēli — katrai grupai sava programma.</p>
  </div>
</header>

<nav class="daynav" aria-label="Dienas">
  <div class="daynav-inner" id="daynav"></div>
</nav>

<main class="wrap sched" id="sched"></main>

<section class="wrap gallery-sec">
  <h2>Mirkļi no nometnes</h2>
  <div class="gallery">
    <img src="https://images.unsplash.com/photo-1441974231531-c6227db76b6e?auto=format&fit=crop&w=800&q=80" alt="Mežs" onerror="this.style.visibility='hidden'">
    <img src="https://images.unsplash.com/photo-1470770841072-f978cf4d019e?auto=format&fit=crop&w=800&q=80" alt="Ezers" onerror="this.style.visibility='hidden'">
    <img src="https://images.unsplash.com/photo-1506905925346-21bda4d32df4?auto=format&fit=crop&w=800&q=80" alt="Kalni" onerror="this.style.visibility='hidden'">
  </div>
</section>

<footer>
  <div class="wrap"><b>Draudzes ģimeņu nometne</b> · 21.–26. jūnijs · kopā 10 dievkalpojumi</div>
</footer>

<script>
const PARALLEL = ['👨‍👩‍👧 Pieaugušie', '🙌 Jaunieši (no 12 g.)', '🎨 Svētdienas skola (3–11 g.)'];

const ACT_CATS = [
  {icon:'🧒', label:'Bērniem',    activity:'Spēles un radošās darbnīcas'},
  {icon:'🙌', label:'Jauniešiem', activity:'Sports un komandu spēles'},
  {icon:'👔', label:'Vīriem',     activity:'Volejbols un sarunas'},
  {icon:'🌸', label:'Sievietēm',  activity:'Rokdarbi un pastaigas'}
];

function fullDay(){
  return [
    {time:'8:30',  title:'Rīta lūgšanas un brokastis', desc:'Visiem kopā'},
    {time:'10:00', title:'Rīta dievkalpojums', parallel:true},
    {time:'13:00', title:'Pusdienas'},
    {time:'14:00', title:'Dienas aktivitātes', cats:true},
    {time:'17:30', title:'Vakariņas'},
    {time:'18:30', title:'Vakara dievkalpojums', parallel:true},
    {time:'22:00', title:'Vakara uzkodas'},
    {time:'22:30', title:'Nakts aktivitāte'}
  ];
}

const DAYS = [
  {name:'Pirmdiena', date:'21.06', d:21, sub:'Ierašanās diena', events:[
    {time:'18:30', title:'Atklāšanas dievkalpojums', parallel:true},
    {time:'22:00', title:'Vakara uzkodas'},
    {time:'22:30', title:'Nakts aktivitāte'}
  ]},
  {name:'Otrdiena',    date:'22.06', d:22, events:fullDay()},
  {name:'Trešdiena',   date:'23.06', d:23, events:fullDay()},
  {name:'Ceturtdiena', date:'24.06', d:24, events:fullDay()},
  {name:'Piektdiena',  date:'25.06', d:25, events:fullDay()},
  {name:'Sestdiena',   date:'26.06', d:26, sub:'Noslēguma diena', events:[
    {time:'8:30',  title:'Rīta lūgšanas un brokastis', desc:'Visiem kopā'},
    {time:'10:00', title:'Noslēguma dievkalpojums', desc:'Visas grupas kopā — nometnes noslēgums'}
  ]}
];

const nav = document.getElementById('daynav');
const sched = document.getElementById('sched');

function renderDay(i){
  const day = DAYS[i];
  document.querySelectorAll('.daypill').forEach((p, j) => p.classList.toggle('active', j === i));
  let html = '<div class="day-head"><h2>' + day.name + ', ' + day.date + '</h2>' +
             (day.sub ? '<p>' + day.sub + '</p>' : '') + '</div>';
  for (const ev of day.events) {
    html += '<div class="event"><div class="time">' + ev.time + '</div><div class="event-body">' +
            '<h3>' + ev.title + '</h3>' +
            (ev.desc ? '<p class="desc">' + ev.desc + '</p>' : '');
    if (ev.parallel) {
      html += '<div class="tags">' + PARALLEL.map(g => '<span class="tag">' + g + '</span>').join('') + '</div>';
    }
    if (ev.cats) {
      html += '<div class="cats">' + ACT_CATS.map(c =>
        '<div class="cat"><b>' + c.icon + ' ' + c.label + '</b><span>' + c.activity + '</span></div>'
      ).join('') + '</div>';
    }
    html += '</div></div>';
  }
  sched.innerHTML = html;
}

DAYS.forEach((day, i) => {
  const btn = document.createElement('button');
  btn.className = 'daypill';
  btn.innerHTML = day.name + '<em>' + day.date + '</em>';
  btn.addEventListener('click', () => renderDay(i));
  nav.appendChild(btn);
});

// Auto-select today's day during camp (June 21–26, year ignored); otherwise Monday.
const now = new Date();
let start = 0;
if (now.getMonth() === 5 && now.getDate() >= 21 && now.getDate() <= 26) {
  start = now.getDate() - 21;
}
renderDay(start);
</script>
</body>
</html>
